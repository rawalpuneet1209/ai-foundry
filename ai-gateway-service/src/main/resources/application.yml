server:
  port: 8080
spring:
  application:
    name: ai-gateway-service
  profiles:
    default: local
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
          temperature: 0.2
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
ai:
  foundry:
    provider:
      name: ollama
      default-chat-model: ${OLLAMA_CHAT_MODEL:llama3.2}
      default-embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
      timeout: 60s
      enabled: true
    prompt:
      max-characters: 50000
    memory:
      max-messages-per-conversation: 30
    rag:
      chunk-size: 1000
      chunk-overlap: 150
      minimum-chunk-length: 100
      max-context-characters: 12000
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
